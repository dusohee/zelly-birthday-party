<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Zelly 300일 파티!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { overscroll-behavior:none; }
body {
  background: linear-gradient(to bottom, #0d47a1 0%, #1565c0 15%, #1e88e5 35%, #64b5f6 60%, #b3e0f7 80%, #dff0fb 100%);
  overflow:hidden; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  overscroll-behavior:none; touch-action:none;
}
#canvas-wrap { width:100vw; height:100vh; height:100dvh; touch-action:none; }
#title-wrap {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:10;
}
#title {
  background:rgba(255,240,250,0.93); border:1.5px solid #e8a0c8;
  border-radius:24px; padding:10px 28px;
  font-size:18px; font-weight:700; color:#a03070; letter-spacing:1px;
  box-shadow:0 2px 16px rgba(200,100,160,0.2); white-space:nowrap;
}
#hint {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.88); border-radius:14px;
  padding:7px 20px; font-size:13px; color:#999;
  border:0.5px solid rgba(0,0,0,0.1); z-index:10;
}
.bubble {
  position:fixed; pointer-events:none; z-index:100;
  background:rgba(255,240,250,0.97); border:2px solid #e8a0c8;
  border-radius:16px; padding:10px 14px; max-width:200px; min-width:100px;
  box-shadow:0 4px 20px rgba(200,100,160,0.28);
  transform:translateX(-50%) translateY(calc(-100% - 14px));
  opacity:0; transition:opacity 0.2s ease;
}
.bubble.show { opacity:1; }
.bubble::after {
  content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  border:10px solid transparent; border-top-color:rgba(255,240,250,0.97); border-bottom:none;
}
.bubble::before {
  content:''; position:absolute; bottom:-13px; left:50%; transform:translateX(-50%);
  border:10px solid transparent; border-top-color:#e8a0c8; border-bottom:none;
}
.bubble-name { font-weight:700; font-size:13px; color:#a03070; margin-bottom:4px; text-align:center; }
.bubble-msg { font-size:12px; color:#555; line-height:1.55; word-break:keep-all; text-align:center; }
#search-box {
  position:fixed; top:18px; right:20px;
  display:flex; gap:7px; align-items:center; z-index:20;
}
#search-input {
  padding:9px 15px; border-radius:20px; border:1.5px solid #e8a0c8;
  font-size:14px; outline:none; width:260px;
  background:rgba(255,240,250,0.95);
  box-shadow:0 2px 10px rgba(200,100,160,0.18);
  font-family:inherit; transition:border-color 0.2s, box-shadow 0.2s;
}
#search-input:focus { border-color:#a03070; box-shadow:0 2px 14px rgba(160,48,112,0.25); }
#search-input.error { border-color:#ff4444; animation:shake 0.35s; }
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}60%{transform:translateX(7px)}}
#search-btn {
  padding:9px 16px; border-radius:20px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#c060a0,#a03070); color:white;
  font-size:13px; font-weight:700; font-family:inherit;
  box-shadow:0 2px 10px rgba(160,48,112,0.3);
  transition:transform 0.12s, box-shadow 0.12s;
}
#search-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(160,48,112,0.4); }
#search-btn:active { transform:translateY(0); }
#zelly-bubble {
  position:fixed; pointer-events:none; z-index:30;
  transform:translateX(-50%) translateY(calc(-100% - 18px));
  background:linear-gradient(135deg,rgba(255,240,250,0.98),rgba(255,225,245,0.98));
  border:2px solid #e060a8; border-radius:20px;
  padding:11px 20px; white-space:nowrap;
  box-shadow:0 6px 28px rgba(200,80,150,0.35);
}
#zelly-bubble::after {
  content:''; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
  border:12px solid transparent; border-top-color:rgba(255,225,245,0.98); border-bottom:none;
}
#zelly-bubble::before {
  content:''; position:absolute; bottom:-15px; left:50%; transform:translateX(-50%);
  border:12px solid transparent; border-top-color:#e060a8; border-bottom:none;
}
#zelly-msg {
  font-size:14px; font-weight:700; color:#a03070;
  transition:opacity 0.25s ease;
  white-space:nowrap;
}
#muteBtn {
  position:fixed; bottom:20px; right:20px;
  background:rgba(255,255,255,0.88); border-radius:14px;
  padding:7px 14px; font-size:18px; line-height:1;
  border:0.5px solid rgba(0,0,0,0.1); z-index:10;
  cursor:pointer; user-select:none;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  transition:background 0.15s;
}
#muteBtn:hover { background:rgba(255,255,255,1); }
#loading-screen {
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg,#ff9ee5 0%,#ffc4f0 40%,#ffe0f8 70%,#fff5fd 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition:opacity 0.9s ease;
}
#loading-screen.fade-out { opacity:0; pointer-events:none; }
.ld-ham {
  font-size:72px; line-height:1;
  animation:hamBounce 0.7s ease-in-out infinite alternate;
}
@keyframes hamBounce {
  from { transform:translateY(0) scale(1); }
  to   { transform:translateY(-18px) scale(1.08); }
}
.ld-title { font-size:22px; font-weight:700; color:#a03070; letter-spacing:1px; }
.ld-sub   { font-size:14px; color:#c070a0; }
.ld-bar-wrap {
  width:240px; height:10px; background:rgba(255,255,255,0.5);
  border-radius:10px; overflow:hidden; border:1px solid rgba(200,100,160,0.3);
}
.ld-bar {
  height:100%; width:0%; background:linear-gradient(90deg,#c060a0,#ff99cc);
  border-radius:10px; transition:width 0.3s ease;
}
.ld-count { font-size:13px; color:#b06090; }
.ld-emojis { font-size:26px; letter-spacing:8px; opacity:0.7; }
#visitor {
  background:rgba(255,255,255,0.88); border-radius:14px;
  padding:5px 16px; font-size:13px; color:#999;
  border:0.5px solid rgba(0,0,0,0.1); display:none; white-space:nowrap;
}
@media (max-width: 640px) {
  #title-wrap { top:10px; left:12px; transform:none; width:calc(100% - 24px); align-items:stretch; }
  #title { font-size:13px; padding:8px 12px; text-align:center; letter-spacing:0.3px; }
  #search-box { top:auto; right:auto; bottom:58px; left:50%; transform:translateX(-50%); width:calc(100% - 32px); }
  #search-input { flex:1; width:0; font-size:16px; padding:8px 12px; }
  #search-btn { font-size:12px; padding:8px 14px; white-space:nowrap; }
  #hint { bottom:12px; font-size:11px; padding:5px 12px; max-width:calc(100% - 80px); }
  #muteBtn { bottom:12px; right:12px; padding:6px 12px; font-size:16px; }
  .bubble { max-width:160px; }
  .bubble-name { font-size:12px; }
  .bubble-msg { font-size:11px; }
  #zelly-bubble { max-width:84vw; padding:8px 14px; }
  #zelly-msg { font-size:12px; white-space:normal; text-align:center; }

const container = document.getElementById('canvas-wrap');
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xb3e0f7, 60, 110);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 120);
camera.position.set(0, 7, 20);
camera.lookAt(0, 2, 0);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sunLight = new THREE.DirectionalLight(0xfff8e0, 1.3);
sunLight.position.set(12, 22, 8); sunLight.castShadow = true; scene.add(sunLight);

const rng = function(a,b){ return a + Math.random()*(b-a); };

function box(w,h,d,x,y,z,col){
  var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function cyl(rt,rb,h,x,y,z,col,seg){
  seg = seg||24;
  var m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function sph(r,x,y,z,col,emissive,emInt){
  var mat = {color:col};
  if(emissive){mat.emissive=emissive; mat.emissiveIntensity=emInt||0.8;}
  var m=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),new THREE.MeshLambertMaterial(mat));
  m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m;
}

// Green grass ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshLambertMaterial({color:0x5cb85c})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Sun
var sunMesh = sph(2.2, 16, 20, -18, 0xffee22, 0xffcc00, 1.0);
var sunGlow = new THREE.PointLight(0xffeeaa, 0.5, 80);
sunGlow.position.set(16, 20, -18); scene.add(sunGlow);

// Clouds
function makeCloud(cx,cy,cz,sc){
  sc = sc||1;
  [[0,0,0,1.2],[1.4,0.2,0,0.9],[-1.3,0.3,0,0.85],[0.6,0.6,0.7,0.75],[-0.5,0.5,-0.6,0.7]].forEach(function(p){
    var c=new THREE.Mesh(new THREE.SphereGeometry(p[3]*sc,10,10),new THREE.MeshLambertMaterial({color:0xffffff}));
    c.position.set(cx+p[0]*sc, cy+p[1]*sc, cz+p[2]*sc); scene.add(c);
  });
}
makeCloud(-10,16,-20,1.3); makeCloud(8,18,-22,1.0);
makeCloud(20,14,-16,1.1); makeCloud(-18,13,-13,0.9);
makeCloud(0,20,-28,1.4); makeCloud(12,17,-10,0.8);

// Trees
function makeTree(x,z){
  cyl(0.3,0.38,4.0,x,2.0,z,0x8B5E3C);
  sph(2.1,x,4.9,z,0x2d8a2d);
  sph(1.6,x+0.4,6.1,z+0.2,0x3aaa3a);
  sph(1.1,x,7.1,z,0x44bb44);
}
makeTree(-24,-12); makeTree(24,-10);
makeTree(-22,10); makeTree(23,11);
makeTree(-10,-24); makeTree(10,-24);
makeTree(0,-26); makeTree(-27,2); makeTree(27,3);

// 최소 거리 4.5 보장 배치 — 넓어진 씬(±22, z:-22~12)에 맞게 확장
var hamPositions=(function(){
  var MIN_DIST=4.5, MAX_TRY=200;
  var placed=[];
  for(var i=0;i<hamsters.length;i++){
    var ok=false;
    for(var a=0;a<MAX_TRY;a++){
      var x=rng(-21,21), z=rng(-21,11);
      if(Math.sqrt(x*x+z*z)<6.5) continue; // 케이크 테이블 주변 제외
      var clear=true;
      for(var j=0;j<placed.length;j++){
        var dx=x-placed[j][0], dz=z-placed[j][1];
        if(Math.sqrt(dx*dx+dz*dz)<MIN_DIST){clear=false;break;}
      }
      if(clear){placed.push([x,z]);ok=true;break;}
    }
    if(!ok) placed.push([rng(-21,21),rng(-21,11)]);
  }
  return placed;
})();

// Search & zoom
var tLookX=0, tLookY=3, tLookZ=0;
var lookX=0,  lookY=3,  lookZ=0;
var zoomTarget=null, zoomTimer=null;

function searchHamster(){
  var q=document.getElementById('search-input').value.trim().toLowerCase().replace(/^@/,'');
  if(!q) return;
  var found=null;
  for(var i=0;i<hamObjs.length;i++){
    if(hamObjs[i].userData.h.name.toLowerCase().indexOf(q)!==-1){ found=hamObjs[i]; break; }
  }
  var inp=document.getElementById('search-input');
  if(!found){
    inp.classList.add('error');
    setTimeout(function(){inp.classList.remove('error');},500);
    return;
  }
  // restore previous zoom target scale
  if(zoomTarget){
    zoomTarget.scale.set(zoomTarget.userData.sw, zoomTarget.userData.sh, 1);
  }
  if(zoomTimer) clearTimeout(zoomTimer);
  zoomTarget=found;
  // scale up found hamster
  found.scale.set(found.userData.sw*1.6, found.userData.sh*1.6, 1);

  // 키보드 닫고 나서 카메라 이동 (모바일 키보드가 뷰포트 가리는 문제 방지)
  document.getElementById('search-input').blur();

  var hx=found.position.x, hz=found.position.z, hy=found.position.y;
  tTheta=Math.atan2(hx, hz) + Math.PI; // 햄스터 반대편에서 바라보기
  tPhi=0.26;
  tRadius=10;
  tLookX=hx; tLookY=hy+0.5; tLookZ=hz; // 햄스터 정중앙을 직접 바라보기

  // show bubble after camera settles
  setTimeout(function(){
    var vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
    showBubble(window.innerWidth/2, vh*0.45, found.userData.h);
  }, 700);

  // reset after 5s
  zoomTimer=setTimeout(function(){
    if(zoomTarget){ zoomTarget.scale.set(zoomTarget.userData.sw,zoomTarget.userData.sh,1); zoomTarget=null; }
    tRadius=20; tLookX=0; tLookY=3; tLookZ=0;
  }, 5000);
}

function showBubble(x, y, h) {
  if(activeBubble){ clearTimeout(bubbleTimer); activeBubble.remove(); activeBubble=null; }
  var el=document.createElement('div');
  el.className='bubble';
  el.innerHTML='<div class="bubble-name">@'+h.name+'</div><div class="bubble-msg">'+h.msg+'</div>';
  var bMargin=Math.min(110,window.innerWidth*0.25);
  el.style.left=Math.min(Math.max(x, bMargin), window.innerWidth-bMargin)+'px';
  el.style.top=y+'px';
  document.body.appendChild(el);
  activeBubble=el;
  requestAnimationFrame(function(){ el.classList.add('show'); });
  bubbleTimer=setTimeout(function(){
    el.classList.remove('show');
    setTimeout(function(){ if(el.parentNode) el.remove(); if(activeBubble===el) activeBubble=null; }, 250);
  }, 3500);
}

renderer.domElement.addEventListener('mousedown',function(e){
  if(e.button===2){ panDrag=true; panLx=e.clientX; panLy=e.clientY; }
  else { drag=true; lx=e.clientX; ly=e.clientY; }
});
renderer.domElement.addEventListener('contextmenu',function(e){ e.preventDefault(); });
var panDrag=false, panLx=0, panLy=0;
var pinchDist0=null, pinchMid0=null;
renderer.domElement.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchMid0={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    drag=false;
  } else {
    drag=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; pinchDist0=null; pinchMid0=null;
  }
},{passive:true});
window.addEventListener('mousemove',function(e){
  if(panDrag){
    var dx=e.clientX-panLx, dy=e.clientY-panLy;
    var spd=radius*0.008;
    tLookX+=Math.cos(theta)*dx*spd; tLookZ-=Math.sin(theta)*dx*spd;
    tLookX-=Math.sin(theta)*dy*spd; tLookZ-=Math.cos(theta)*dy*spd;
    tLookX=Math.max(-22,Math.min(22,tLookX)); tLookZ=Math.max(-22,Math.min(12,tLookZ));
    panLx=e.clientX; panLy=e.clientY; return;
  }
  if(!drag)return;
  tTheta-=(e.clientX-lx)*0.008;
  tPhi=Math.max(0.05,Math.min(1.15,tPhi+(e.clientY-ly)*0.008));
  lx=e.clientX; ly=e.clientY;
});
window.addEventListener('touchmove',function(e){
  if(e.touches.length===2&&pinchDist0!==null){
    var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    tRadius=Math.max(5,Math.min(32,tRadius-(dist-pinchDist0)*0.06));
    pinchDist0=dist;
    if(pinchMid0){
      var mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      var my=(e.touches[0].clientY+e.touches[1].clientY)/2;
      var dx=mx-pinchMid0.x, dy=my-pinchMid0.y;
      var spd=tRadius*0.008;
      tLookX+=Math.cos(theta)*dx*spd; tLookZ-=Math.sin(theta)*dx*spd;
      tLookX-=Math.sin(theta)*dy*spd; tLookZ-=Math.cos(theta)*dy*spd;
      tLookX=Math.max(-22,Math.min(22,tLookX)); tLookZ=Math.max(-22,Math.min(12,tLookZ));
      pinchMid0={x:mx,y:my};
    }
    return;
  }
  if(!drag)return;
  tTheta-=(e.touches[0].clientX-lx)*0.01;
  tPhi=Math.max(0.05,Math.min(1.15,tPhi+(e.touches[0].clientY-ly)*0.01));
  lx=e.touches[0].clientX; ly=e.touches[0].clientY;
},{passive:true});
window.addEventListener('mouseup',function(){drag=false; panDrag=false;});
window.addEventListener('touchend',function(){drag=false; pinchDist0=null; pinchMid0=null;});
renderer.domElement.addEventListener('wheel',function(e){tRadius=Math.max(5,Math.min(32,tRadius+e.deltaY*0.02));},{passive:true});

renderer.domElement.addEventListener('click',function(e){
  var rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,camera);
  var hits=ray.intersectObjects(hamObjs);
  if(hits.length){
    showBubble(e.clientX, e.clientY, hits[0].object.userData.h);
  }
});

// 더블탭: 햄스터 → 줌인+버블, 빈 공간 → 카메라 이동
var lastTapTime=0, lastTapX=0, lastTapY=0;
renderer.domElement.addEventListener('touchend',function(e){
  if(e.changedTouches.length!==1) return;
  var now=Date.now(), tx=e.changedTouches[0].clientX, ty=e.changedTouches[0].clientY;
  var dt=now-lastTapTime;
  if(dt<300 && Math.hypot(tx-lastTapX, ty-lastTapY)<44){
    e.preventDefault();
    lastTapTime=0;
    var rect=renderer.domElement.getBoundingClientRect();
    mouse.x=((tx-rect.left)/rect.width)*2-1;
    mouse.y=-((ty-rect.top)/rect.height)*2+1;
    ray.setFromCamera(mouse,camera);
    var hits=ray.intersectObjects(hamObjs);
    if(hits.length){
      var found=hits[0].object;
      if(zoomTarget) zoomTarget.scale.set(zoomTarget.userData.sw,zoomTarget.userData.sh,1);
      if(zoomTimer) clearTimeout(zoomTimer);
      zoomTarget=found;
      found.scale.set(found.userData.sw*1.6,found.userData.sh*1.6,1);
      tTheta=Math.atan2(found.position.x,found.position.z)+Math.PI;
      tPhi=0.26; tRadius=10;
      tLookX=found.position.x; tLookY=found.position.y+0.5; tLookZ=found.position.z;
      setTimeout(function(){
        var vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
        showBubble(window.innerWidth/2,vh*0.45,found.userData.h);
      },700);
      zoomTimer=setTimeout(function(){
        if(zoomTarget){zoomTarget.scale.set(zoomTarget.userData.sw,zoomTarget.userData.sh,1);zoomTarget=null;}
        tRadius=20; tLookX=0; tLookY=3; tLookZ=0;
      },5000);
    } else {
      var gPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
      var gPoint=new THREE.Vector3();
      if(ray.ray.intersectPlane(gPlane,gPoint)){
        tLookX=Math.max(-20,Math.min(20,gPoint.x));
        tLookY=2;
        tLookZ=Math.max(-20,Math.min(10,gPoint.z));
        tRadius=Math.max(8,tRadius*0.72);
      }
    }
  } else {
    lastTapTime=now; lastTapX=tx; lastTapY=ty;
  }
});

var t=0;
function animate(){
  requestAnimationFrame(animate); t+=0.016;
  theta+=(tTheta-theta)*0.08;
  phi+=(tPhi-phi)*0.08;
  radius+=(tRadius-radius)*0.08;
  camera.position.x=radius*Math.sin(theta)*Math.cos(phi);
  camera.position.y=2+radius*Math.sin(phi);
  camera.position.z=radius*Math.cos(theta)*Math.cos(phi);
  lookX+=(tLookX-lookX)*0.06; lookY+=(tLookY-lookY)*0.06; lookZ+=(tLookZ-lookZ)*0.06;
  camera.lookAt(lookX,lookY,lookZ);
  flameMesh.position.y=3.87+Math.sin(t*9)*0.04;
  cLight.intensity=1.6+Math.sin(t*13)*0.3;
  sunMesh.position.y=20+Math.sin(t*0.08)*0.6;
  balloonObjs.forEach(function(b){b.position.y=b.userData.baseY+Math.sin(t*1.2+b.userData.phase)*0.22;});
  hamObjs.forEach(function(s){s.position.y=s.userData.baseY+Math.sin(t*1.4+s.userData.phase)*0.1;});
  zellySprite.position.y=zellySprite.userData.baseY+Math.sin(t*1.1)*0.18;

  // Cycle bubble name
  zellyMsgT+=0.016;
  if(zellyMsgT>=ZELLY_INTERVAL){
    zellyMsgT=0;
    zellyMsgIndex=(zellyMsgIndex+1)%hamsters.length;
    var msgEl=document.getElementById('zelly-msg');
    msgEl.style.opacity='0';
    var capturedIdx=zellyMsgIndex;
    setTimeout(function(){
      msgEl.textContent='@'+hamsters[capturedIdx].name+'야, 내 생파에 와줘서 고마오';
      msgEl.style.opacity='1';
    },200);
  }

  // Track zelly bubble to top of sprite (center + half height)
  var zp=new THREE.Vector3(
    zellySprite.position.x,
    zellySprite.position.y + zellySprite.userData.sh * 0.5 + 0.4,
    zellySprite.position.z
  );
  zp.project(camera);
  if(zp.z<1){
    var bx=(zp.x+1)/2*window.innerWidth;
    var by=(-zp.y+1)/2*window.innerHeight;
    var zMargin=Math.min(120,window.innerWidth*0.28);
    bx=Math.max(zMargin,Math.min(window.innerWidth-zMargin,bx));
    by=Math.max(70,Math.min(window.innerHeight-60,by));
    var bub=document.getElementById('zelly-bubble');
    bub.style.left=bx+'px'; bub.style.top=by+'px'; bub.style.display='block';
  }

  // Confetti fall
  confetti.forEach(function(c){
    var d=c.userData;
    c.position.y+=d.vy;
    c.position.x+=d.vx+Math.sin(t*d.swayFreq+d.swayPhase)*d.swayAmp;
    c.position.z+=d.vz;
    c.rotation.x+=d.rx;
    c.rotation.y+=d.ry;
    c.rotation.z+=d.rz;
    if(c.position.y<-0.5){
      c.position.y=rng(24,34);
      c.position.x=rng(-24,24);
      c.position.z=rng(-24,12);
    }
  });

  renderer.render(scene,camera);
}
animate();

if('ontouchstart' in window){
  document.getElementById('hint').textContent='한 손가락: 회전 · 두 손가락: 이동+줌 · 탭: 메시지';
}

function onResize(){
  var w=window.innerWidth;
  var h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  renderer.setPixelRatio(window.devicePixelRatio);
}
window.addEventListener('resize',onResize);
if(window.visualViewport) window.visualViewport.addEventListener('resize',onResize);

// ===== BGM: Happy Birthday (Web Audio API) =====
var audioCtx=null, masterGain=null;
var bgmMuted=false, bgmActive=false;
var bgmNextStart=0, bgmScheduler=null;

// [주파수Hz, 길이(초)] — 0은 쉼표
var hbNotes=[
  [392,0.35],[392,0.18],[440,0.53],[392,0.53],[523,0.53],[494,1.06],[0,0.27],
  [392,0.35],[392,0.18],[440,0.53],[392,0.53],[587,0.53],[523,1.06],[0,0.27],
  [392,0.35],[392,0.18],[784,0.53],[659,0.53],[523,0.53],[494,0.53],[440,1.06],[0,0.27],
  [698,0.35],[698,0.18],[659,0.53],[523,0.53],[587,0.53],[523,1.60],[0,1.2]
];
var hbDur=hbNotes.reduce(function(s,n){return s+n[1];},0);

function scheduleHBLoop(startAt){
  var t=startAt;
  hbNotes.forEach(function(n){
    if(n[0]>0){
      var osc=audioCtx.createOscillator();
      var osc2=audioCtx.createOscillator();
      var env=audioCtx.createGain();
      var env2=audioCtx.createGain();
      osc.type='sine'; osc.frequency.value=n[0];
      osc2.type='triangle'; osc2.frequency.value=n[0]/2;
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(0.22,t+0.025);
      env.gain.setValueAtTime(0.22,t+n[1]*0.65);
      env.gain.linearRampToValueAtTime(0,t+n[1]*0.92);
      env2.gain.setValueAtTime(0,t);
      env2.gain.linearRampToValueAtTime(0.07,t+0.03);
      env2.gain.linearRampToValueAtTime(0,t+n[1]*0.88);
      osc.connect(env); env.connect(masterGain);
      osc2.connect(env2); env2.connect(masterGain);
      osc.start(t); osc.stop(t+n[1]);
      osc2.start(t); osc2.stop(t+n[1]);
    }
    t+=n[1];
  });
  return t;
}

function bgmTick(){
  if(!bgmActive) return;
  var now=audioCtx.currentTime;
  if(bgmNextStart-now<3){
    bgmNextStart=scheduleHBLoop(Math.max(bgmNextStart,now+0.1));
  }
  bgmScheduler=setTimeout(bgmTick,1000);
}

function initBGM(){
  if(bgmActive) return;
  bgmActive=true;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=bgmMuted?0:0.42;
  masterGain.connect(audioCtx.destination);
  bgmNextStart=audioCtx.currentTime+0.5;
  bgmNextStart=scheduleHBLoop(bgmNextStart);
  bgmTick();
}

function toggleMute(){
  bgmMuted=!bgmMuted;
  if(!bgmActive){ initBGM(); }
  else if(masterGain){
    masterGain.gain.setTargetAtTime(bgmMuted?0:0.42,audioCtx.currentTime,0.3);
  }
  document.getElementById('muteBtn').textContent=bgmMuted?'🔇':'🎵';
}

document.getElementById('muteBtn').addEventListener('click',function(e){
  e.stopPropagation();
  toggleMute();
});

// 첫 인터랙션 시 BGM 시작 (브라우저 자동재생 정책)
function _bgmStart(){
  initBGM();
  document.removeEventListener('click',_bgmStart);
  document.removeEventListener('touchstart',_bgmStart);
  document.removeEventListener('wheel',_bgmStart);
}
document.addEventListener('click',_bgmStart);
document.addEventListener('touchstart',_bgmStart);
document.addEventListener('wheel',_bgmStart);

// ===== 방문자 카운터 (counterapi.dev 무료 API) =====
(function(){
  var el=document.getElementById('visitor');
  fetch('https://api.counterapi.dev/v1/zelly-birthday-300/visits/up')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&typeof d.count==='number'){
        el.textContent='🐹 지금까지 '+d.count+'명이 다녀갔어요';
        el.style.display='block';
      }
    })
    .catch(function(){/* API 불가 시 조용히 숨김 */});
})();
