  background:rgba(255,240,250,0.93); border:1.5px solid #e8a0c8;

#hint {

  pointer-events:auto;
}
#popup-close {
  position:absolute; top:8px; right:12px;
  background:none; border:none; cursor:pointer;
  font-size:17px; color:#a03070; line-height:1;
}
#popup-emoji { font-size:30px; text-align:center; margin-bottom:8px; }
#popup-name { font-weight:700; font-size:14px; color:#a03070; text-align:center; margin-bottom:6px; }

const container = document.getElementById('canvas-wrap');

renderer.setClearColor(0xfff0f8);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0xfff0f8, 22, 65);

camera.lookAt(0, 3, 0);

scene.add(new THREE.AmbientLight(0xffeeff, 0.9));
const dl = new THREE.DirectionalLight(0xffd0f0, 1.1);
dl.position.set(5,15,8); dl.castShadow=true; scene.add(dl);
scene.add(Object.assign(new THREE.PointLight(0xffe0ff,0.5,30), {position:{set(x,y,z){this.x=x;this.y=y;this.z=z;return this;}}}));
const fl = new THREE.PointLight(0xffe0ff, 0.5, 30);
fl.position.set(-5,8,5); scene.add(fl);

function box(w,h,d,x,y,z,col){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function cyl(rt,rb,h,x,y,z,col,seg=32){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m;
}
function plane(w,h,x,y,z,rx,ry,col){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshLambertMaterial({color:col,side:THREE.DoubleSide}));
  m.position.set(x,y,z); m.rotation.set(rx,ry,0); scene.add(m);
}

// === Hamster sprite generator ===
const tc=document.createElement('canvas'); tc.width=128; tc.height=128;
const tx=tc.getContext('2d');

function drawHam(name){
  tx.clearRect(0,0,128,128);
  tx.fillStyle='rgba(252,228,242,0.93)';
  tx.beginPath(); tx.ellipse(64,80,52,38,0,0,Math.PI*2); tx.fill();
  tx.fillStyle='#f5c08a';
  tx.beginPath(); tx.ellipse(64,57,34,32,0,0,Math.PI*2); tx.fill();
  tx.fillStyle='#e8a870';
  tx.beginPath(); tx.ellipse(35,63,17,13,0.3,0,Math.PI*2); tx.fill();
  tx.beginPath(); tx.ellipse(93,63,17,13,-0.3,0,Math.PI*2); tx.fill();
  tx.fillStyle='#c07840';
  tx.beginPath(); tx.arc(45,28,9,0,Math.PI*2); tx.fill();
  tx.beginPath(); tx.arc(83,28,9,0,Math.PI*2); tx.fill();
  tx.fillStyle='#f0a090';
  tx.beginPath(); tx.arc(45,28,5,0,Math.PI*2); tx.fill();
  tx.beginPath(); tx.arc(83,28,5,0,Math.PI*2); tx.fill();
  tx.fillStyle='#1a1a1a';
  tx.beginPath(); tx.arc(50,54,4.5,0,Math.PI*2); tx.fill();
  tx.beginPath(); tx.arc(78,54,4.5,0,Math.PI*2); tx.fill();
  tx.fillStyle='white';
  tx.beginPath(); tx.arc(52,52,2,0,Math.PI*2); tx.fill();
  tx.beginPath(); tx.arc(80,52,2,0,Math.PI*2); tx.fill();
  tx.fillStyle='#f0a0b0';
  tx.beginPath(); tx.arc(64,66,4,0,Math.PI*2); tx.fill();
  // badge
  tx.fillStyle='rgba(160,48,112,0.93)';
  tx.beginPath();
  tx.roundRect ? tx.roundRect(6,95,116,26,10) : tx.rect(6,95,116,26);
  tx.fill();
  tx.fillStyle='white';
  tx.font='bold 10px sans-serif';
  tx.textAlign='center'; tx.textBaseline='middle';
  const label = name.length>11 ? name.slice(0,10)+'…' : name;
  tx.fillText(label,64,108);
  return tc;
}

const hamObjs=[];
const rng=(a,b)=>a+Math.random()*(b-a);

hamsters.forEach((h,i)=>{
  const c2=document.createElement('canvas'); c2.width=128; c2.height=128;
  drawHam(h.name);
  c2.getContext('2d').drawImage(tc,0,0);
  const tex=new THREE.CanvasTexture(c2);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  let x,y,z;
  const zone=i%7;
  if(zone===0){x=rng(-15,-5);y=rng(1.5,7);z=rng(-12,-4);}
  else if(zone===1){x=rng(5,15);y=rng(1.5,7);z=rng(-12,-4);}
  else if(zone===2){x=rng(-15,15);y=rng(8,13);z=rng(-13,-5);}
  else if(zone===3){x=rng(-5,5);y=rng(1.5,5);z=rng(2,10);}
  else if(zone===4){x=rng(-15,15);y=rng(13,18);z=rng(-14,-2);}
  else if(zone===5){x=rng(-14,14);y=rng(2,7);z=rng(-14,-9);}
  else{x=rng(-14,14);y=rng(5,10);z=rng(-5,4);}
  const s=0.85+Math.random()*0.65;
  sp.scale.set(s*1.2,s,1);
  sp.position.set(x,y,z);
  sp.userData={h,baseY:y,phase:Math.random()*Math.PI*2};
  scene.add(sp);
  hamObjs.push(sp);
});

const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

renderer.domElement.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;popup.style.display='none';});
renderer.domElement.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  tTheta-=(e.clientX-lx)*0.008;
  tPhi=Math.max(0.05,Math.min(1.15,tPhi+(e.clientY-ly)*0.008));
  lx=e.clientX;ly=e.clientY;
});
window.addEventListener('touchmove',e=>{
  if(!drag)return;
  tTheta-=(e.touches[0].clientX-lx)*0.01;
  tPhi=Math.max(0.05,Math.min(1.15,tPhi+(e.touches[0].clientY-ly)*0.01));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:true});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('touchend',()=>drag=false);
renderer.domElement.addEventListener('wheel',e=>{tRadius=Math.max(4,Math.min(26,tRadius+e.deltaY*0.02));},{passive:true});

renderer.domElement.addEventListener('click',e=>{
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(hamObjs);
  if(hits.length){
    const {h}=hits[0].object.userData;
    popup.style.left=Math.min(e.clientX+14, window.innerWidth-235)+'px';
    popup.style.top=Math.max(e.clientY-75, 10)+'px';
    popup.style.display='block';
    document.getElementById('popup-name').textContent='@'+h.name;
    document.getElementById('popup-msg').textContent=h.msg;
  }
});

let t=0;
function animate(){
  requestAnimationFrame(animate); t+=0.016;
  theta+=(tTheta-theta)*0.08;
  phi+=(tPhi-phi)*0.08;
  radius+=(tRadius-radius)*0.08;
  camera.position.x=radius*Math.sin(theta)*Math.cos(phi);
  camera.position.y=3+radius*Math.sin(phi);
  camera.position.z=radius*Math.cos(theta)*Math.cos(phi);
  camera.lookAt(0,4,0);
  flameMesh.position.y=5.52+Math.sin(t*9)*0.04;
  cLight.intensity=1.4+Math.sin(t*13)*0.25;
  chanMesh.position.y=19.0+Math.sin(t*0.5)*0.05;
  hamObjs.forEach(s=>{s.position.y=s.userData.baseY+Math.sin(t*1.4+s.userData.phase)*0.18;});
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
